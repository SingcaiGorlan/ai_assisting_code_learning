name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Build for Intel Mac
        run: |
          cd web/wails-app
          wails build -platform darwin/amd64 -ldflags="-s -w"
      
      - name: Build for Apple Silicon
        run: |
          cd web/wails-app
          wails build -platform darwin/arm64 -ldflags="-s -w"
      
      - name: Compress Intel version
        run: |
          cd web/wails-app/build/darwin/amd64
          zip -r ../../../../AI-Learning-Platform-macOS-Intel.zip "AI辅助代码学习平台.app"
      
      - name: Compress Apple Silicon version
        run: |
          cd web/wails-app/build/darwin/arm64
          zip -r ../../../../AI-Learning-Platform-macOS-AppleSilicon.zip "AI辅助代码学习平台.app"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: macos-builds
          path: |
            AI-Learning-Platform-macOS-Intel.zip
            AI-Learning-Platform-macOS-AppleSilicon.zip
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AI-Learning-Platform-macOS-Intel.zip
            AI-Learning-Platform-macOS-AppleSilicon.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
