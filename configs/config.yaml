server:
  host: "0.0.0.0"
  port: 8081
  mode: "debug"

database:
  driver: "sqlite"
  path: "./data/ai_learning.db"

ai:
  provider: "openai"
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-3.5-turbo"
  base_url: "https://api.openai.com/v1"
  max_tokens: 1000
  temperature: 0.7

jwt:
  secret: "${JWT_SECRET}"
  expire: 24

log:
  level: "info"
  format: "json"
  file_path: "./logs/app.log"
