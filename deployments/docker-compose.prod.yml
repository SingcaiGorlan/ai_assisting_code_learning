version: '3.8'

services:
  # Go 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alp-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.production
    networks:
      - app-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: alp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/app/dist:/var/www/app/dist:ro
      - ./deployments/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
